version: "3.9"

services:
  hellobooks-ai:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env                  # loads GOOGLE_API_KEY from your .env file
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
